<div class="app-layout">
  <aside class="sidebar">
    <header class="sidebar-header">
      <h1>Wi-Fi Explorer CDMX</h1>
      <p>Puntos de acceso gratuitos</p>
    </header>

    <div class="sidebar-content">
      @if (wifiService.loading()) {
        <div class="status-banner loading">Cargando dataset espacial...</div>
      }
      @if (wifiService.error()) {
        <div class="status-banner error">⚠️ {{ wifiService.error() }}</div>
      }

      <div [style.display]="(wifiService.loading() || wifiService.error()) ? 'none' : 'block'">
        <app-filters></app-filters>
        
        <app-point-details></app-point-details>

        <app-favorites-list></app-favorites-list>
      </div>
    </div>
  </aside>

  <main class="map-container" [style.visibility]="(wifiService.loading() || wifiService.error()) ? 'hidden' : 'visible'">
    <app-map></app-map> 
  </main>
</div>
